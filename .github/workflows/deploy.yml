name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 20 * * *" # daily ~06:30 AEST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run fetch-episodes
      - run: npm run build
      - name: Audit built output for leaked secrets
        run: |
          ! grep -rEl "(api[_-]?key|BEGIN [A-Z]+ PRIVATE KEY|gho_[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{30,})" dist/ || (echo "possible secret in dist/" && exit 1)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Detect new youtube matches
        id: mapdiff
        run: echo "changed=$(git diff --quiet src/data/youtube-map.json && echo no || echo yes)" >> "$GITHUB_OUTPUT"
      - name: Upload updated youtube map
        if: steps.mapdiff.outputs.changed == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: youtube-map
          path: src/data/youtube-map.json

  persist-map:
    needs: build
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        id: dl
        with:
          name: youtube-map
          path: src/data
      - name: Commit updated map
        if: steps.dl.outcome == 'success'
        run: |
          if ! git diff --quiet src/data/youtube-map.json; then
            git config user.name "pt-site-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/youtube-map.json
            git commit -m "chore: persist new youtube thumbnail matches [skip ci]"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
